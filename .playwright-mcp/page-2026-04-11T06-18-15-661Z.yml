  - generic [ref=e97]: FAQ
  - region "Frequently asked questions about custom cabinets" [ref=e98]:
    - heading "Frequently Asked Questions" [level=2] [ref=e99]
    - generic [ref=e100]:
      - paragraph [ref=e101]: What are custom cabinets?
      - paragraph [ref=e102]: Custom cabinets are built specifically for your space rather than using standard sizes. Every dimension, material, and finish is tailored to fit your home precisely, resulting in a better fit, improved functionality, and a higher level of overall quality.
    - generic [ref=e103]:
      - paragraph [ref=e104]: What is the difference between framed and frameless cabinets?
      - paragraph [ref=e105]: Framed cabinets use a face frame on the front of the cabinet box, which adds strength, stability, and long-term durability. Frameless cabinets, often referred to as European-style cabinets, do not have this frame and rely on thicker box construction for support. While frameless designs can offer a more modern appearance, framed cabinets are generally more rigid and better suited for long-term performance.
    - generic [ref=e106]:
      - paragraph [ref=e107]: Are framed cabinets more durable than frameless cabinets?
      - paragraph [ref=e108]: Framed cabinets are typically more durable because the face frame reinforces the structure of the cabinet. This added support helps prevent shifting, sagging, and misalignment over time, especially in high-use areas like kitchens.
    - generic [ref=e109]:
      - paragraph [ref=e110]: What materials are best for high-quality cabinets?
      - paragraph [ref=e111]: High-quality cabinets are built using durable materials such as high-grade plywood and solid wood components. These materials resist moisture, wear, and long-term stress better than alternatives like MDF or low-grade particle board, which are more prone to swelling and deterioration.
    - generic [ref=e112]:
      - paragraph [ref=e113]: Do you use MDF in your cabinets?
      - paragraph [ref=e114]: We avoid using MDF and low-quality materials in critical structural areas. Our focus is on using materials that maintain their integrity over time and perform well in real living environments.
    - generic [ref=e115]:
      - paragraph [ref=e116]: How long do custom cabinets last?
      - paragraph [ref=e117]: When built with proper construction methods and high-quality materials, custom cabinets can last for decades. Longevity depends on both the materials used and the precision of the build and installation.
    - generic [ref=e118]:
      - paragraph [ref=e119]: Do you offer custom cabinets in Orange County and Newport Beach?
      - paragraph [ref=e120]: Yes, we design and build custom cabinetry throughout Orange County, including Newport Beach, Corona del Mar, Irvine, and surrounding areas. We also take on projects throughout Southern California and beyond.
    - generic [ref=e121]:
      - paragraph [ref=e122]: What is the process for getting custom cabinets?
      - paragraph [ref=e123]: The process typically begins with design and planning, followed by material selection, fabrication, and installation. We guide you through each phase to ensure the final result aligns with your vision and performs as expected.
    - generic [ref=e124]:
      - paragraph [ref=e125]: Are custom cabinets worth the investment?
      - paragraph [ref=e126]: Custom cabinets offer long-term value through better materials, precise fit, and improved durability. While the initial investment may be higher than pre-built options, they are designed to last longer and perform better over time.
    - generic [ref=e127]:
      - paragraph [ref=e128]: Can custom cabinets be designed for my exact space and needs?
      - paragraph [ref=e129]: Yes. Custom cabinetry is built specifically for your layout, allowing for complete flexibility in sizing, storage solutions, and overall design. This ensures that your cabinets not only look refined but function exactly as needed.
    - generic [ref=e130]: If you are considering custom cabinetry and want a solution built to a higher standard, we are here to help guide the process from design through installation.
