  - main [ref=e19]:
    - generic [ref=e20]:
      - generic [ref=e21]: Our Approach
      - heading "Built with intention. Built to endure." [level=2] [ref=e22]:
        - text: Built with intention.
        - emphasis [ref=e23]: Built to endure.
      - paragraph [ref=e24]: At H & J Cabinets, we design and build custom cabinetry using premium materials and proven construction methods. Every cabinet is built with intention, ensuring long-term durability, precise fit, and a finish that holds its quality over time.
      - paragraph [ref=e25]: We work directly with homeowners, interior designers, and architects across Orange County and Southern California to create cabinetry that is singular to each project, no catalogue, no compromises, no shortcuts. The result is cabinetry that not only looks exceptional on day one, but continues to perform and look exceptional for decades.
    - generic [ref=e26]:
      - generic [ref=e27]: Why It Matters
      - heading "The case for custom cabinetry" [level=2] [ref=e28]:
        - text: The case for
        - emphasis [ref=e29]: custom cabinetry
      - paragraph [ref=e30]: Stock and semi-custom cabinets are built to general dimensions for a general customer. Custom cabinets are built for your specific space, your specific lifestyle, and your specific vision. The difference is felt every single day.
      - list [ref=e31]:
        - listitem [ref=e32]:
          - generic [ref=e33]:
            - strong [ref=e34]: Durability
            - text: Custom cabinets are built from higher-grade materials with superior joinery techniques, resulting in a product that holds up under real daily use for decades rather than years.
        - listitem [ref=e35]:
          - generic [ref=e36]:
            - strong [ref=e37]: Precision fit
            - text: Every inch of your space is used intentionally. No filler panels, no awkward gaps, no wasted space. Cabinetry that was made for the room it lives in.
        - listitem [ref=e38]:
          - generic [ref=e39]:
            - strong [ref=e40]: Long-term value
            - text: Quality cabinetry is one of the highest-return investments in a home. It drives resale value, enhances livability, and does not need to be replaced when trends shift, because it was built around your space, not a catalogue.
    - generic [ref=e41]:
      - generic [ref=e42]: Construction Methods
      - 'heading "Where we win: framed construction" [level=2] [ref=e43]':
        - text: "Where we win:"
        - emphasis [ref=e44]: framed construction
      - paragraph [ref=e45]: H & J Cabinets builds using traditional face-frame construction, the method that has defined premium cabinetry for generations, and the method that continues to outperform modern frameless alternatives in structural integrity and long-term performance.
      - paragraph [ref=e46]: The face frame, a solid hardwood frame attached to the front of the cabinet box, reinforces the entire structure. It keeps the cabinet square and stable as a home settles over time. It provides a secure mounting surface for doors and hardware. And it ensures that doors and drawers stay aligned and operate smoothly for the life of the cabinet.
      - list [ref=e47]:
        - listitem [ref=e48]: Face-frame construction provides structural integrity that frameless systems cannot match
        - listitem [ref=e49]: Cabinets remain square and stable as the home naturally settles over the years
        - listitem [ref=e50]: Doors and drawers maintain alignment and smooth operation with daily use
        - listitem [ref=e51]: Longevity built into the construction method, not just the materials
    - generic [ref=e52]:
      - generic [ref=e53]: Materials
      - heading "No MDF. No low-grade shortcuts." [level=2] [ref=e54]:
        - text: No MDF.
        - emphasis [ref=e55]: No low-grade shortcuts.
      - paragraph [ref=e56]: The materials inside your cabinets matter as much as what you see on the surface. At H & J Cabinets, we never use MDF or low-grade plywood in critical areas, the structural components that determine how well your cabinetry holds up over time.
      - list [ref=e57]:
        - listitem [ref=e58]: Premium hardwoods selected for grain, figure, and structural integrity
        - listitem [ref=e59]: High-quality plywood for cabinet boxes, dimensionally stable and resistant to warping
        - listitem [ref=e60]: Superior resistance to moisture, humidity, and the conditions of real kitchen and bathroom environments
        - listitem [ref=e61]: No swelling, no delaminating, no premature breakdown, because the materials chosen do not allow for it
      - paragraph [ref=e62]: "Every material decision is made with the end product in mind: cabinetry that holds its quality across decades of use, not just the first few years."
    - generic [ref=e63]:
      - generic [ref=e64]: The Process
      - heading "Design. Build. Install." [level=2] [ref=e65]:
        - text: Design. Build.
        - emphasis [ref=e66]: Install.
      - paragraph [ref=e67]: Our process is straightforward because we have refined it over 30 years. No subcontractors. No handoffs. Our team handles every phase, which means accountability at every step and a final product that reflects our standards, not a third party's.
      - generic [ref=e68]:
        - generic [ref=e69]:
          - generic [ref=e70]: "01"
          - heading "Design" [level=3] [ref=e71]
          - paragraph [ref=e72]: We meet, we listen, and we draw. Every project begins with a detailed design phase, hand-drawn renderings and precision drawings that give you a clear picture of the final result before a single board is cut.
        - generic [ref=e73]:
          - generic [ref=e74]: "02"
          - heading "Build" [level=3] [ref=e75]
          - paragraph [ref=e76]: Your cabinetry is built in our shop by master craftsmen using hand-selected materials. Each piece is built exclusively for your project, no stock components, no catalogue pulls.
        - generic [ref=e77]:
          - generic [ref=e78]: "03"
          - heading "Install" [level=3] [ref=e79]
          - paragraph [ref=e80]: Our own team installs every project. Precise fit, clean finish, and a final walkthrough to ensure everything meets our standard, and yours. We also offer a lifetime adjustment guarantee for any settling that occurs after installation.
    - generic [ref=e81]:
      - generic [ref=e82]: Where We Work
      - heading "Serving Orange County and beyond" [level=2] [ref=e83]:
        - text: Serving Orange County
        - emphasis [ref=e84]: and beyond
      - paragraph [ref=e85]: H & J Cabinets is based in Santa Ana, California, and serves clients across Orange County, Southern California, and select projects nationwide. We work closely with homeowners, architects, and interior designers on high-end residential projects from initial concept through final installation.
