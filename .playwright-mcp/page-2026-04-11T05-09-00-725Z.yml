    - generic [ref=e29]:
      - generic [ref=e30]:
        - generic [ref=e31]: "01"
        - heading "Built for Strength" [level=3] [ref=e32]
        - paragraph [ref=e33]: Our cabinets are constructed using a traditional framed design, which provides a level of structural integrity that frameless systems simply cannot match. The face frame reinforces the entire cabinet, keeping everything square, stable, and secure over time. This results in doors and drawers that stay aligned, operate smoothly, and maintain their quality even with daily use.
      - generic [ref=e34]:
        - generic [ref=e35]: "02"
        - heading "Premium Materials, No Shortcuts" [level=3] [ref=e36]
        - paragraph [ref=e37]: We believe that what goes inside your cabinets matters just as much as what you see on the outside. That is why we never use MDF or low-grade plywood in critical areas. Instead, we select high-quality materials that are more resistant to moisture, wear, and long-term stress. This approach not only increases durability but also helps prevent issues like swelling, warping, and premature breakdown.
      - generic [ref=e38]:
        - generic [ref=e39]: "03"
        - heading "Lifetime Adjustment Guarantee" [level=3] [ref=e40]
        - paragraph [ref=e41]: Over time, natural settling can cause minor shifts in cabinetry. Rather than passing that responsibility on to you, we stand behind our work for the long term. Our lifetime adjustment guarantee means that if your cabinets ever need to be realigned or fine-tuned, we will take care of it at no cost. It is a commitment to lasting performance and continued support.
      - generic [ref=e42]:
        - generic [ref=e43]: "04"
        - heading "30+ Years of Craftsmanship" [level=3] [ref=e44]
        - paragraph [ref=e45]: With more than two decades of experience in high-end custom cabinetry, we bring a deep understanding of both design and construction to every project. We combine proven craftsmanship with modern technology to achieve precise fits, clean finishes, and consistent results. Each cabinet is built with care, attention, and a level of detail that reflects our standards.
      - generic [ref=e46]:
        - generic [ref=e47]: "05"
        - heading "A Better Client Experience" [level=3] [ref=e48]
        - paragraph [ref=e49]: We approach every project with the mindset that the experience should feel just as refined as the final product. From the initial design to the final installation, we prioritize clarity, transparency, and responsiveness. We keep change order costs to a minimum and work closely with you to ensure the process remains smooth and predictable. Our goal is not only to meet expectations but to deliver a result that feels thoughtfully executed from start to finish.
